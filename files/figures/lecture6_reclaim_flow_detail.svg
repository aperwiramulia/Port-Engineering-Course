<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Stockyard reclaim flow detail</title>
  <desc id="desc">Concept diagram showing reclaim flow from stockpile through reclaimer and outbound conveyor to ship loader or inland dispatch.</desc>
  <defs>
    <marker id="reclaimArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="372" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="52" y="58" font-size="24" font-family="Arial, sans-serif" fill="#1f2937" font-weight="700">Stockyard Reclaim Flow: Pile → Reclaimer → Dispatch</text>

  <rect x="72" y="102" width="320" height="206" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="170" y="130" font-size="18" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Stockpile Zone</text>
  <polygon points="115,265 200,150 285,265" fill="#d6d3d1" stroke="#a8a29e" stroke-width="2"/>
  <polygon points="210,265 290,165 365,265" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="287" font-size="13" font-family="Arial, sans-serif" fill="#475569">Stored cargo buffer and blending area</text>

  <rect x="445" y="148" width="185" height="84" rx="12" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
  <text x="495" y="178" font-size="18" font-family="Arial, sans-serif" fill="#6b21a8" font-weight="700">Reclaimer</text>
  <text x="470" y="199" font-size="13" font-family="Arial, sans-serif" fill="#5b21b6">Recovers cargo at controlled rate</text>
  <text x="486" y="217" font-size="13" font-family="Arial, sans-serif" fill="#5b21b6">Feeds outbound conveyor</text>
  <line x1="392" y1="190" x2="445" y2="190" stroke="#7c3aed" stroke-width="5" marker-end="url(#reclaimArrow)"/>

  <rect x="675" y="170" width="210" height="38" rx="10" fill="#f3e8ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="715" y="194" font-size="15" font-family="Arial, sans-serif" fill="#6b21a8" font-weight="700">Outbound Conveyor</text>
  <line x1="630" y1="190" x2="675" y2="190" stroke="#7c3aed" stroke-width="5" marker-end="url(#reclaimArrow)"/>

  <rect x="930" y="118" width="140" height="60" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="962" y="152" font-size="16" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Ship Loader</text>
  <line x1="885" y1="189" x2="930" y2="148" stroke="#7c3aed" stroke-width="4" marker-end="url(#reclaimArrow)"/>

  <rect x="930" y="222" width="168" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="953" y="248" font-size="15" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Truck / Rail / Plant</text>
  <text x="968" y="268" font-size="12.5" font-family="Arial, sans-serif" fill="#991b1b">Inland dispatch option</text>
  <line x1="885" y1="192" x2="930" y2="245" stroke="#7c3aed" stroke-width="4" marker-end="url(#reclaimArrow)"/>

  <rect x="92" y="328" width="1020" height="44" rx="10" fill="#f8fafc" stroke="#d6deea"/>
  <text x="112" y="348" font-size="14" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Design note:</text>
  <text x="196" y="348" font-size="13.5" font-family="Arial, sans-serif" fill="#475569">Reclaim capacity must match dispatch demand; otherwise stock builds up or vessel/plant loading is delayed.</text>
  <text x="112" y="366" font-size="13.5" font-family="Arial, sans-serif" fill="#475569">Typical watchpoints: reclaim travel limits, moisture effects, blending requirements, and conveyor availability.</text>
</svg>