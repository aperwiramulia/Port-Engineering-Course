<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Typical seaport layout with common sedimentation hot spots</title>
  <desc id="desc">Teaching diagram showing shoreline, breakwaters, quays, jetties, port entrance, navigation channel, turning basin, and the main sedimentation hot spots in a typical seaport.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="652" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="56" y="62" font-size="26" font-family="Arial, sans-serif" fill="#1f2937" font-weight="700">Typical Seaport Layout: Port Elements and Sedimentation Hot Spots</text>
  <text x="56" y="91" font-size="15" font-family="Arial, sans-serif" fill="#475569">Use this plan-view diagram to identify shoreline, breakwaters, quays, jetties, entrance, turning basin, and the locations where sediment commonly accumulates.</text>

  <rect x="70" y="114" width="130" height="34" rx="17" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="97" y="136" font-size="14" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">OPEN SEA</text>
  <rect x="915" y="114" width="190" height="34" rx="17" fill="#dcfce7" stroke="#86efac"/>
  <text x="945" y="136" font-size="14" font-family="Arial, sans-serif" fill="#166534" font-weight="700">HARBOR / ESTUARY SIDE</text>

  <path d="M60 205 L438 205 L438 515 L60 515 Z" fill="#cfe8ff"/>
  <path d="M438 205 L950 205 L950 515 L438 515 Z" fill="#d9f0ff"/>
  <path d="M950 170 C1035 170, 1095 178, 1140 194 L1140 560 C1090 548, 1025 535, 950 535 Z" fill="#caefcf"/>
  <path d="M950 170 C1035 170, 1095 178, 1140 194" fill="none" stroke="#b45309" stroke-width="4"/>
  <path d="M950 535 C1025 535, 1090 548, 1140 560" fill="none" stroke="#b45309" stroke-width="4"/>
  <text x="1028" y="163" font-size="14" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">Shoreline</text>

  <path d="M438 300 L520 205 L548 205 L468 335 Z" fill="#bfc8d6" stroke="#64748b" stroke-width="2"/>
  <path d="M438 420 L520 515 L548 515 L468 386 Z" fill="#bfc8d6" stroke="#64748b" stroke-width="2"/>
  <text x="484" y="188" font-size="13" font-family="Arial, sans-serif" fill="#334155" font-weight="700">North breakwater</text>
  <text x="484" y="544" font-size="13" font-family="Arial, sans-serif" fill="#334155" font-weight="700">South breakwater</text>

  <line x1="360" y1="360" x2="448" y2="360" stroke="#0f172a" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="195" y="338" width="154" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="218" y="363" font-size="14" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Port entrance</text>

  <path d="M80 322 C196 322, 290 325, 420 348" fill="none" stroke="#2563eb" stroke-width="5" stroke-dasharray="10 7" marker-end="url(#arrowBlue)"/>
  <text x="112" y="296" font-size="14" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">Littoral drift / coastal sediment supply</text>

  <path d="M1130 235 C1085 270, 1050 318, 1018 362" fill="none" stroke="#16a34a" stroke-width="5" stroke-dasharray="10 7" marker-end="url(#arrowGreen)"/>
  <text x="886" y="221" font-size="14" font-family="Arial, sans-serif" fill="#166534" font-weight="700">River or estuary sediment input</text>

  <path d="M520 360 C612 340, 675 334, 760 342" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 7" marker-end="url(#arrowRed)"/>
  <text x="596" y="320" font-size="13" font-family="Arial, sans-serif" fill="#475569" font-weight="700">Navigation channel</text>

  <circle cx="760" cy="360" r="88" fill="#fca5a5" fill-opacity="0.45" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="760" cy="360" r="58" fill="#ffffff" fill-opacity="0.45" stroke="#94a3b8" stroke-dasharray="8 6" stroke-width="2"/>
  <text x="713" y="350" font-size="16" font-family="Arial, sans-serif" fill="#7c2d12" font-weight="700">Turning basin</text>
  <text x="700" y="374" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">common low-energy sediment trap</text>

  <rect x="878" y="278" width="28" height="152" rx="8" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <rect x="918" y="286" width="28" height="138" rx="8" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <rect x="958" y="296" width="28" height="120" rx="8" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <text x="858" y="455" font-size="13" font-family="Arial, sans-serif" fill="#334155" font-weight="700">Quays / berth line</text>

  <rect x="1000" y="240" width="20" height="90" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="1000" y="390" width="20" height="88" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="1020" y="260" width="72" height="18" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="1020" y="410" width="70" height="18" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="1010" y="233" font-size="13" font-family="Arial, sans-serif" fill="#334155" font-weight="700">Jetty</text>
  <text x="1010" y="501" font-size="13" font-family="Arial, sans-serif" fill="#334155" font-weight="700">Jetty</text>

  <ellipse cx="470" cy="360" rx="42" ry="92" fill="#fca5a5" fill-opacity="0.72" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="565" cy="282" rx="72" ry="42" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="565" cy="438" rx="72" ry="42" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="925" cy="352" rx="105" ry="58" fill="#fecaca" fill-opacity="0.8" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="1065" cy="282" rx="78" ry="50" fill="#fca5a5" fill-opacity="0.72" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="1060" cy="446" rx="90" ry="50" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>

  <line x1="302" y1="177" x2="536" y2="264" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="84" y="145" width="212" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="104" y="165" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">1. Entrance hot spot</text>
  <text x="104" y="184" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Littoral drift meets the port entrance and channel throat.</text>

  <line x1="304" y1="236" x2="522" y2="282" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="88" y="209" width="208" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="108" y="229" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">2. Breakwater shadow zone</text>
  <text x="108" y="248" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Sediment settles in sheltered water behind the north arm.</text>

  <line x1="304" y1="510" x2="523" y2="441" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="84" y="484" width="212" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="104" y="504" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">3. Breakwater shadow zone</text>
  <text x="104" y="523" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Low-energy water behind the south arm also traps fines.</text>

  <line x1="604" y1="590" x2="716" y2="431" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="420" y="580" width="178" height="54" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="440" y="601" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">4. Turning basin hot spot</text>
  <text x="440" y="620" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Large calm maneuvering water encourages deposition.</text>

  <line x1="1050" y1="612" x2="951" y2="394" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="932" y="590" width="214" height="54" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="952" y="611" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">5. Quay / berth pocket hot spot</text>
  <text x="952" y="630" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Overdeepened berths near quays often need maintenance dredging.</text>

  <line x1="1118" y1="211" x2="1082" y2="247" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="930" y="164" width="190" height="48" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="950" y="184" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">6. River mouth / delta-front hot spot</text>
  <text x="950" y="203" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Mixing of river flow, tide, and waves creates unstable shoals.</text>

  <line x1="1124" y1="514" x2="1090" y2="464" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="938" y="504" width="182" height="48" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="958" y="524" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">7. Inner bend / confluence hot spot</text>
  <text x="958" y="543" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Circulation turns and redistributes sediment along the shoreline.</text>

  <rect x="68" y="616" width="280" height="28" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="88" y="635" font-size="13" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Brown line = shoreline on the landward side of the harbor.</text>
  <rect x="362" y="616" width="286" height="28" rx="8" fill="#fee2e2" stroke="#fecaca"/>
  <text x="382" y="635" font-size="13" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Red shaded areas = common sedimentation hot spots to monitor or dredge.</text>
  <rect x="662" y="616" width="214" height="28" rx="8" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="682" y="635" font-size="13" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">Blue dashed arrow = littoral drift.</text>
  <rect x="890" y="616" width="246" height="28" rx="8" fill="#dcfce7" stroke="#bbf7d0"/>
  <text x="910" y="635" font-size="13" font-family="Arial, sans-serif" fill="#166534" font-weight="700">Green dashed arrow = river / estuary sediment input.</text>
</svg>
