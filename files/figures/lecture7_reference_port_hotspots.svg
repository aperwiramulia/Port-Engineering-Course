  <rect x="820" y="390" width="110" height="18" rx="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="845" y="420" width="100" height="18" rx="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="820" y="344" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Quays / jetties</text>

  <rect x="240" y="530" width="18" height="82" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="278" y="512" width="18" height="100" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="316" y="494" width="18" height="118" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="213" y="491" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Fishing / small craft berths</text>

  <rect x="430" y="327" width="30" height="10" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="2" transform="rotate(-22 445 332)"/>
  <rect x="459" y="340" width="22" height="10" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="2" transform="rotate(-22 470 345)"/>
  <text x="402" y="314" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Oil berth / dolphins</text>

  <ellipse cx="535" cy="304" rx="52" ry="22" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="445" cy="350" rx="68" ry="28" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="520" cy="396" rx="74" ry="34" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="655" cy="420" rx="112" ry="70" fill="#fca5a5" fill-opacity="0.48" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="760" cy="522" rx="178" ry="36" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="272" cy="560" rx="70" ry="44" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="440" cy="560" rx="52" ry="88" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="860" cy="395" rx="120" ry="64" fill="#fecaca" fill-opacity="0.62" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>

  <circle cx="536" cy="304" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="530" y="310" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">1</text>
  <circle cx="446" cy="350" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="440" y="356" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">2</text>
  <circle cx="520" cy="396" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="514" y="402" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">3</text>
  <circle cx="655" cy="420" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="649" y="426" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">4</text>
  <circle cx="812" cy="523" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="806" y="529" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">5</text>
  <circle cx="272" cy="560" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="266" y="566" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">6</text>
  <circle cx="440" cy="560" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="434" y="566" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">7</text>
  <circle cx="860" cy="395" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="854" y="401" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">8</text>

  <rect x="52" y="684" width="1096" height="276" rx="14" fill="#fff7f7" stroke="#fecaca"/>
  <text x="78" y="715" font-size="16" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Hot-spot notes</text>

  <rect x="78" y="732" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="96" y="752" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">1. Entrance throat shoaling</text>
  <text x="96" y="770" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Sediment converges where the approach channel enters the breakwater gap.</text>

  <rect x="618" y="732" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="636" y="752" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">2. Lee zone behind outer breakwater</text>
  <text x="636" y="770" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Wave shelter reduces transport capacity and encourages deposition.</text>

  <rect x="78" y="790" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="96" y="810" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">3. Inner approach transition zone</text>
  <text x="96" y="828" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Flow expansion between entrance and basin creates another shoaling reach.</text>

  <rect x="618" y="790" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="636" y="810" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">4. Turning basin deposition</text>
  <text x="636" y="828" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Large maneuvering circles are classic low-velocity fine-sediment traps.</text>

  <rect x="78" y="848" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="96" y="868" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">5. Main berth pockets</text>
  <text x="96" y="886" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Overdeepened quay fronts commonly accumulate silt and need maintenance dredging.</text>

  <rect x="618" y="848" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="636" y="868" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">6. Small-craft basin or fishing port</text>
  <text x="636" y="886" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Poor flushing in recessed side basins makes them prone to shoaling.</text>

  <rect x="78" y="906" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="96" y="926" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">7. Enclosed repair or inner berth pocket</text>
  <text x="96" y="944" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Recessed harbor corners and dock approaches often trap fine sediment.</text>

  <rect x="618" y="906" width="502" height="48" rx="10" fill="#ffffff" stroke="#fecdd3"/>
  <text x="636" y="926" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">8. Sheltered inner quay zone</text>
  <text x="636" y="944" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Weak circulation behind berths and jetties promotes local deposition.</text>
</svg>
