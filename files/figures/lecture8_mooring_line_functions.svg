<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Clean plan-view mooring line diagram showing head, stern, breast, and spring lines">
  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrowHeadStern" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrowBreast" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowSpring" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#15803d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <rect x="18" y="18" width="1164" height="724" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>

  <text x="56" y="66" font-size="34" font-weight="700" fill="#1f2937">Mooring Line Functions (Plan View)</text>
  <text x="56" y="100" font-size="20" fill="#475569">Neat schematic of how each line group controls vessel motion alongside a berth.</text>

  <!-- Main drawing area frame -->
  <rect x="50" y="130" width="1100" height="510" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- Berth -->
  <rect x="110" y="190" width="210" height="390" rx="8" fill="#cbd5e1"/>
  <line x1="320" y1="190" x2="320" y2="580" stroke="#94a3b8" stroke-width="3"/>
  <text x="118" y="618" font-size="22" font-weight="700" fill="#334155">Berth / Quay</text>

  <!-- Bollards -->
  <circle cx="300" cy="225" r="8" fill="#0f172a"/>
  <circle cx="300" cy="285" r="8" fill="#0f172a"/>
  <circle cx="300" cy="345" r="8" fill="#0f172a"/>
  <circle cx="300" cy="405" r="8" fill="#0f172a"/>
  <circle cx="300" cy="465" r="8" fill="#0f172a"/>
  <circle cx="300" cy="525" r="8" fill="#0f172a"/>

  <!-- Vessel -->
  <rect x="500" y="210" width="570" height="350" rx="150" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
  <rect x="560" y="245" width="450" height="280" rx="120" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="735" y="392" font-size="30" font-weight="700" fill="#334155">Vessel</text>
  <text x="905" y="270" font-size="18" fill="#475569">Bow</text>
  <text x="560" y="270" font-size="18" fill="#475569">Stern</text>

  <!-- Mooring points on vessel -->
  <circle cx="920" cy="285" r="6" fill="#334155"/>
  <circle cx="890" cy="320" r="6" fill="#334155"/>
  <circle cx="875" cy="385" r="6" fill="#334155"/>
  <circle cx="875" cy="470" r="6" fill="#334155"/>
  <circle cx="620" cy="420" r="6" fill="#334155"/>
  <circle cx="650" cy="455" r="6" fill="#334155"/>
  <circle cx="700" cy="270" r="6" fill="#334155"/>
  <circle cx="675" cy="505" r="6" fill="#334155"/>

  <!-- Head and stern lines -->
  <line x1="920" y1="285" x2="300" y2="225" stroke="#ea580c" stroke-width="6"/>
  <line x1="890" y1="320" x2="300" y2="285" stroke="#ea580c" stroke-width="6"/>
  <line x1="620" y1="420" x2="300" y2="465" stroke="#ea580c" stroke-width="6"/>
  <line x1="650" y1="455" x2="300" y2="525" stroke="#ea580c" stroke-width="6"/>

  <!-- Breast lines -->
  <line x1="875" y1="385" x2="300" y2="385" stroke="#1d4ed8" stroke-width="7"/>
  <line x1="875" y1="470" x2="300" y2="470" stroke="#1d4ed8" stroke-width="7"/>

  <!-- Spring lines -->
  <line x1="700" y1="270" x2="300" y2="405" stroke="#15803d" stroke-width="6"/>
  <line x1="675" y1="505" x2="300" y2="345" stroke="#15803d" stroke-width="6"/>

  <!-- Callout labels -->
  <rect x="865" y="154" width="250" height="48" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="882" y="184" font-size="20" font-weight="700" fill="#9a3412">Head lines</text>
  <line x1="930" y1="202" x2="920" y2="272" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowHeadStern)"/>

  <rect x="520" y="560" width="250" height="48" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="538" y="590" font-size="20" font-weight="700" fill="#9a3412">Stern lines</text>
  <line x1="640" y1="560" x2="640" y2="468" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowHeadStern)"/>

  <rect x="910" y="418" width="200" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="926" y="448" font-size="20" font-weight="700" fill="#1e40af">Breast lines</text>
  <line x1="910" y1="442" x2="882" y2="442" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBreast)"/>

  <rect x="540" y="150" width="220" height="48" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="556" y="180" font-size="20" font-weight="700" fill="#166534">Spring lines</text>
  <line x1="640" y1="198" x2="678" y2="262" stroke="#15803d" stroke-width="3" marker-end="url(#arrowSpring)"/>

  <!-- Motion guide -->
  <text x="54" y="676" font-size="20" font-weight="700" fill="#334155">Primary motion control:</text>
  <line x1="295" y1="668" x2="380" y2="668" stroke="#1f2937" stroke-width="3" marker-end="url(#arrowDark)"/>
  <line x1="380" y1="688" x2="295" y2="688" stroke="#1f2937" stroke-width="3" marker-end="url(#arrowDark)"/>
  <text x="392" y="685" font-size="18" fill="#334155">Surge (head/stern + spring)</text>
  <line x1="730" y1="668" x2="790" y2="668" stroke="#1f2937" stroke-width="3" marker-end="url(#arrowDark)"/>
  <line x1="790" y1="688" x2="730" y2="688" stroke="#1f2937" stroke-width="3" marker-end="url(#arrowDark)"/>
  <text x="804" y="685" font-size="18" fill="#334155">Sway (breast)</text>
</svg>
