<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Liquid bulk terminal transfer flow</title>
  <desc id="desc">Conceptual liquid bulk transfer chain from vessel to loading arms, manifold, pumps, tank farm, and outbound delivery systems.</desc>
  <defs>
    <marker id="arrowLiquid" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowOutbound" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="372" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="52" y="58" font-size="24" font-family="Arial, sans-serif" fill="#1f2937" font-weight="700">Liquid Bulk Transfer Chain: Ship to Tanks and Dispatch</text>

  <rect x="58" y="76" width="165" height="30" rx="15" fill="#ccfbf1" stroke="#5eead4"/>
  <text x="83" y="96" font-size="14" font-family="Arial, sans-serif" fill="#115e59" font-weight="700">SHIP-SHORE TRANSFER</text>

  <path d="M56 206 L182 206 L208 230 L82 230 Z" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <rect x="62" y="230" width="150" height="46" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="91" y="258" font-size="17" font-family="Arial, sans-serif" fill="#0c4a6e" font-weight="700">Tanker at Jetty</text>

  <rect x="258" y="186" width="140" height="96" rx="10" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="286" y="220" font-size="17" font-family="Arial, sans-serif" fill="#155e75" font-weight="700">Loading Arms</text>
  <text x="290" y="242" font-size="13" font-family="Arial, sans-serif" fill="#334155">ESD and quick release</text>
  <line x1="212" y1="253" x2="258" y2="253" stroke="#0f766e" stroke-width="4" marker-end="url(#arrowLiquid)"/>

  <rect x="438" y="196" width="150" height="76" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="479" y="224" font-size="17" font-family="Arial, sans-serif" fill="#166534" font-weight="700">Manifold</text>
  <text x="452" y="246" font-size="13" font-family="Arial, sans-serif" fill="#475569">Metering and routing valves</text>
  <line x1="398" y1="233" x2="438" y2="233" stroke="#0f766e" stroke-width="4" marker-end="url(#arrowLiquid)"/>

  <rect x="632" y="184" width="170" height="100" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="687" y="217" font-size="17" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">Pump Station</text>
  <text x="655" y="240" font-size="13" font-family="Arial, sans-serif" fill="#475569">Transfer pumps and surge control</text>
  <text x="667" y="260" font-size="13" font-family="Arial, sans-serif" fill="#475569">Pressure governs line duty</text>
  <line x1="588" y1="233" x2="632" y2="233" stroke="#0f766e" stroke-width="4" marker-end="url(#arrowLiquid)"/>

  <rect x="842" y="102" width="265" height="210" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="923" y="130" font-size="18" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Tank Farm</text>
  <rect x="872" y="164" width="74" height="112" rx="37" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="960" y="150" width="82" height="126" rx="41" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
  <rect x="1052" y="174" width="34" height="102" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="880" y="297" font-size="13" font-family="Arial, sans-serif" fill="#7c2d12">Storage, segregation, buffer</text>
  <line x1="802" y1="233" x2="842" y2="233" stroke="#0f766e" stroke-width="4" marker-end="url(#arrowLiquid)"/>

  <rect x="58" y="314" width="1112" height="60" rx="14" fill="#fffaf0" stroke="#fcd34d" stroke-width="2"/>
  <text x="84" y="337" font-size="14" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">OUTBOUND DELIVERY OPTIONS</text>

  <line x1="975" y1="312" x2="975" y2="344" stroke="#b45309" stroke-width="5" marker-end="url(#arrowOutbound)"/>
  <rect x="884" y="344" width="142" height="20" rx="8" fill="#fde68a" stroke="#f59e0b"/>
  <text x="915" y="358" font-size="12.5" font-family="Arial, sans-serif" fill="#78350f" font-weight="700">Outbound Pipeline</text>

  <line x1="1035" y1="233" x2="1112" y2="233" stroke="#0f766e" stroke-width="4" marker-end="url(#arrowLiquid)"/>
  <rect x="1112" y="194" width="46" height="78" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="1118" y="218" font-size="11.5" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Truck</text>
  <text x="1118" y="234" font-size="11.5" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Rack</text>
  <text x="1118" y="250" font-size="11.5" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">or Rail</text>

  <rect x="70" y="372" width="1088" height="24" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="93" y="388" font-size="13.5" font-family="Arial, sans-serif" fill="#475569">Liquid bulk capacity depends on loading-arm duty, pump rate, pipeline hydraulics, tank availability, and safe shutdown / containment philosophy.</text>
</svg>