<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Mooring line functions: head lines, stern lines, breast lines, and spring lines on a vessel alongside a berth">
  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="720" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>

  <text x="56" y="68" font-size="34" font-weight="700" fill="#1f2937">Mooring Line Functions (Plan View)</text>
  <text x="56" y="104" font-size="20" fill="#475569">Example vessel alongside berth showing the role of each major line group.</text>

  <rect x="80" y="170" width="220" height="430" rx="8" fill="#cbd5e1"/>
  <text x="110" y="640" font-size="22" font-weight="700" fill="#334155">Berth / Quay Line</text>

  <rect x="420" y="190" width="650" height="390" rx="110" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
  <rect x="510" y="230" width="470" height="310" rx="95" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="660" y="405" font-size="30" font-weight="700" fill="#334155">Vessel</text>
  <text x="870" y="315" font-size="18" fill="#475569">Bow</text>
  <text x="510" y="315" font-size="18" fill="#475569">Stern</text>

  <!-- Bollards -->
  <circle cx="250" cy="230" r="8" fill="#0f172a"/>
  <circle cx="250" cy="300" r="8" fill="#0f172a"/>
  <circle cx="250" cy="370" r="8" fill="#0f172a"/>
  <circle cx="250" cy="440" r="8" fill="#0f172a"/>
  <circle cx="250" cy="510" r="8" fill="#0f172a"/>
  <circle cx="250" cy="580" r="8" fill="#0f172a"/>

  <!-- Head and stern lines (orange) -->
  <line x1="945" y1="280" x2="250" y2="230" stroke="#f97316" stroke-width="6"/>
  <line x1="920" y1="310" x2="250" y2="300" stroke="#f97316" stroke-width="6"/>
  <line x1="555" y1="465" x2="250" y2="510" stroke="#f97316" stroke-width="6"/>
  <line x1="585" y1="495" x2="250" y2="580" stroke="#f97316" stroke-width="6"/>

  <!-- Breast lines (blue) -->
  <line x1="760" y1="255" x2="250" y2="255" stroke="#2563eb" stroke-width="7"/>
  <line x1="760" y1="525" x2="250" y2="525" stroke="#2563eb" stroke-width="7"/>

  <!-- Spring lines (green) -->
  <line x1="700" y1="260" x2="250" y2="440" stroke="#16a34a" stroke-width="6"/>
  <line x1="650" y1="520" x2="250" y2="370" stroke="#16a34a" stroke-width="6"/>

  <!-- Function arrows -->
  <line x1="735" y1="660" x2="835" y2="660" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="835" y1="680" x2="735" y2="680" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="630" y="670" font-size="18" fill="#334155">Surge control (head/stern + spring)</text>

  <line x1="1030" y1="430" x2="1110" y2="430" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1110" y1="460" x2="1030" y2="460" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="930" y="450" font-size="18" fill="#334155">Sway control (breast)</text>

  <!-- Legend -->
  <rect x="68" y="54" width="460" height="98" rx="10" fill="#ffffff" stroke="#d6deea"/>
  <line x1="90" y1="84" x2="145" y2="84" stroke="#f97316" stroke-width="6"/>
  <text x="155" y="90" font-size="18" fill="#1f2937">Head and stern lines: resist longitudinal drift</text>
  <line x1="90" y1="112" x2="145" y2="112" stroke="#2563eb" stroke-width="7"/>
  <text x="155" y="118" font-size="18" fill="#1f2937">Breast lines: resist lateral movement</text>
  <line x1="90" y1="140" x2="145" y2="140" stroke="#16a34a" stroke-width="6"/>
  <text x="155" y="146" font-size="18" fill="#1f2937">Spring lines: limit surge and fore-aft motion</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
