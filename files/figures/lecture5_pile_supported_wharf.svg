<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-label="Pile-supported wharf schematic for port berth design">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1100" height="560" fill="#f8fafc"/>
  <rect x="30" y="30" width="1040" height="500" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <text x="60" y="75" font-size="32" fill="#0f172a" font-weight="700">Pile-Supported Wharf</text>

  <rect x="90" y="220" width="900" height="80" fill="#dbeafe"/>
  <text x="115" y="205" font-size="20" fill="#1e3a8a" font-weight="700">Water and Vessel Interface</text>

  <rect x="260" y="170" width="640" height="35" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="160" font-size="22" fill="#1f2937" font-weight="700">Deck / Beam System</text>

  <line x1="350" y1="205" x2="350" y2="430" stroke="#475569" stroke-width="12"/>
  <line x1="460" y1="205" x2="460" y2="430" stroke="#475569" stroke-width="12"/>
  <line x1="570" y1="205" x2="570" y2="430" stroke="#475569" stroke-width="12"/>
  <line x1="680" y1="205" x2="680" y2="430" stroke="#475569" stroke-width="12"/>
  <line x1="790" y1="205" x2="790" y2="430" stroke="#475569" stroke-width="12"/>

  <line x1="300" y1="205" x2="250" y2="430" stroke="#334155" stroke-width="10"/>
  <line x1="840" y1="205" x2="890" y2="430" stroke="#334155" stroke-width="10"/>

  <rect x="90" y="430" width="900" height="55" fill="#d6d3d1"/>
  <text x="760" y="470" font-size="20" fill="#44403c">Seabed / Bearing Strata</text>

  <line x1="165" y1="190" x2="255" y2="190" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="95" y="185" font-size="20" fill="#334155" font-weight="700">Berthing load via fender</text>

  <line x1="520" y1="120" x2="520" y2="170" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="112" font-size="20" fill="#334155" font-weight="700">Crane and deck loads</text>

  <line x1="460" y1="440" x2="460" y2="490" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="330" y="515" font-size="20" fill="#334155" font-weight="700">Pile axial and lateral transfer</text>

  <text x="95" y="545" font-size="20" fill="#475569">Typical checks: pile axial/lateral capacity, deck-pile connection, fatigue and durability.</text>
</svg>
