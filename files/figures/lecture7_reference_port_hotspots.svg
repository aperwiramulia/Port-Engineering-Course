<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Reference multipurpose port layout with sedimentation hot spots</title>
  <desc id="desc">Multipurpose port layout with numbered sedimentation hot spots on the plan and a separate note panel below to keep the harbor geometry readable.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#64748b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="1000" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="960" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>

  <text x="52" y="60" font-size="26" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Reference Port Layout: Likely Sedimentation Hot Spots</text>
  <text x="52" y="88" font-size="15" font-family="Arial, sans-serif" fill="#475569">The base layout is kept clear and each hot spot is keyed to a separate note below so the geometry stays legible.</text>

