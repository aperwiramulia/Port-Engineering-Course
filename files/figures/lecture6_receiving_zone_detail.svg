<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Receiving zone detail: hopper, feeder, and transfer tower</title>
  <desc id="desc">Concept diagram showing bulk cargo flow through the hopper, feeder, belt loading zone, and enclosed transfer tower with dust and spillage control measures.</desc>
  <defs>
    <marker id="rzArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="372" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="52" y="58" font-size="24" font-family="Arial, sans-serif" fill="#1f2937" font-weight="700">Receiving Zone Detail: Hopper → Feeder → Transfer Tower</text>

  <rect x="80" y="102" width="210" height="170" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <path d="M110 136 L260 136 L225 215 L145 215 Z" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="148" y="124" font-size="18" font-family="Arial, sans-serif" fill="#92400e" font-weight="700">Hopper</text>
  <text x="115" y="240" font-size="13" font-family="Arial, sans-serif" fill="#7c2d12">Receives cargo from unloader</text>
  <text x="108" y="258" font-size="13" font-family="Arial, sans-serif" fill="#7c2d12">Helps buffer short-term flow variation</text>

  <rect x="335" y="150" width="170" height="78" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="390" y="178" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Feeder</text>
  <text x="357" y="198" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">Meters discharge to conveyor</text>
  <text x="349" y="216" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">Prevents surge loading</text>

  <line x1="290" y1="188" x2="335" y2="188" stroke="#334155" stroke-width="4" marker-end="url(#rzArrow)"/>

  <rect x="540" y="170" width="210" height="34" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="587" y="192" font-size="15" font-family="Arial, sans-serif" fill="#166534" font-weight="700">Receiving Belt</text>
  <line x1="505" y1="188" x2="540" y2="188" stroke="#334155" stroke-width="4" marker-end="url(#rzArrow)"/>

  <rect x="790" y="98" width="270" height="178" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="857" y="126" font-size="18" font-family="Arial, sans-serif" fill="#6b21a8" font-weight="700">Transfer Tower</text>
  <rect x="835" y="148" width="180" height="60" rx="10" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="868" y="173" font-size="14" font-family="Arial, sans-serif" fill="#5b21b6" font-weight="700">Enclosed chute</text>
  <text x="857" y="191" font-size="12.5" font-family="Arial, sans-serif" fill="#5b21b6">Controls direction change and drop</text>
  <line x1="750" y1="188" x2="790" y2="188" stroke="#334155" stroke-width="4" marker-end="url(#rzArrow)"/>

  <rect x="86" y="302" width="1020" height="70" rx="12" fill="#f8fafc" stroke="#d6deea"/>
  <text x="108" y="326" font-size="15" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Key control points</text>
  <text x="108" y="348" font-size="13.5" font-family="Arial, sans-serif" fill="#475569">• Feeder: steady discharge, skirt sealing, impact support, and easy cleanup access.</text>
  <text x="108" y="366" font-size="13.5" font-family="Arial, sans-serif" fill="#475569">• Transfer tower: enclosed chute, wear liners, dust extraction/sprays, and safe blockage-clearing access.</text>

  <circle cx="455" cy="120" r="10" fill="#ef4444"/>
  <text x="472" y="125" font-size="12.5" font-family="Arial, sans-serif" fill="#991b1b">Spillage risk if feed surges</text>
  <circle cx="965" cy="88" r="10" fill="#f59e0b"/>
  <text x="982" y="93" font-size="12.5" font-family="Arial, sans-serif" fill="#9a3412">Dust hotspot at direction change</text>
</svg>