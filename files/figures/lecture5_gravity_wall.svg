<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-label="Gravity wall schematic for port berth design">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1100" height="560" fill="#f8fafc"/>
  <rect x="30" y="30" width="1040" height="500" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <text x="60" y="75" font-size="32" fill="#0f172a" font-weight="700">Gravity Wall (Mass or Caisson Type)</text>

  <rect x="90" y="290" width="900" height="170" fill="#d6d3d1"/>
  <text x="760" y="480" font-size="20" fill="#44403c">Foundation Soil</text>

  <rect x="90" y="180" width="360" height="110" fill="#dbeafe"/>
  <text x="110" y="170" font-size="20" fill="#1e3a8a" font-weight="700">Sea Side Water</text>

  <polygon points="450,160 620,160 700,290 450,290" fill="#f59e0b" stroke="#b45309" stroke-width="3"/>
  <text x="500" y="220" font-size="24" fill="#111827" font-weight="700">Wall Body</text>

  <rect x="700" y="120" width="230" height="170" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="735" y="215" font-size="22" fill="#1f2937" font-weight="700">Backfill</text>

  <line x1="220" y1="210" x2="455" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="90" y="205" font-size="20" fill="#334155" font-weight="700">Hydrostatic + Earth Pressure</text>

  <line x1="620" y1="120" x2="620" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="505" y="112" font-size="20" fill="#334155" font-weight="700">Self-weight provides stability</text>

  <line x1="545" y1="290" x2="545" y2="360" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="390" font-size="20" fill="#334155" font-weight="700">Bearing check at base</text>

  <text x="95" y="520" font-size="20" fill="#475569">Typical checks: sliding, overturning, bearing capacity, settlement.</text>
</svg>
