  <text x="728" y="314" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Outer breakwater</text>
  <text x="246" y="444" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Inner breakwater</text>
  <text x="464" y="625" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Breakwater / quay separator</text>
  <text x="76" y="618" font-size="13" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Coastline</text>
  <text x="1002" y="660" font-size="13" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Coastline</text>

  <rect x="60" y="690" width="1080" height="74" rx="14" fill="#f8fafc" stroke="#d6deea"/>
  <text x="84" y="718" font-size="13.5" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Key features:</text>
  <text x="84" y="742" font-size="13" font-family="Arial, sans-serif" fill="#334155">General cargo berths, container berths, passenger berths, fishing port, oil berth, ship repair area, turning basin, entrance channel, breakwaters, and coastline.</text>
  <text x="84" y="760" font-size="13" font-family="Arial, sans-serif" fill="#334155">This is the same reference geometry used in Figure B, but shown first without sediment hot-spot overlays.</text>
</svg>