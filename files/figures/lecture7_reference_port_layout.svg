<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Reference multipurpose port layout</title>
  <desc id="desc">Clean teaching diagram of a multipurpose artificial port showing the main harbor geometry and operational zones before sedimentation hot spots are added.</desc>

  <rect width="1200" height="820" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="780" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>

  <text x="52" y="62" font-size="28" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Reference Multipurpose Port Layout</text>
  <text x="52" y="92" font-size="15" font-family="Arial, sans-serif" fill="#475569">Base layout shown without sediment annotations so students can read the harbor geometry first.</text>

  <rect x="68" y="118" width="140" height="34" rx="17" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="102" y="141" font-size="14" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">OPEN SEA</text>
