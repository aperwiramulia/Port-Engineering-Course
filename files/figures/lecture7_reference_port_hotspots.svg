<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Reference multipurpose port layout with sedimentation hot spots</title>
  <desc id="desc">Simplified multipurpose port layout showing shoreline, breakwaters, entrance channel, turning basin, quays, jetties, and numbered sedimentation hot spots in sheltered and low-energy zones.</desc>
  <defs>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#64748b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="720" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="52" y="60" font-size="26" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Reference Port Layout: Likely Sedimentation Hot Spots</text>
  <text x="52" y="88" font-size="15" font-family="Arial, sans-serif" fill="#475569">Based on a typical multipurpose artificial-port plan: shoaling usually concentrates at the entrance, in sheltered lee zones, in the turning basin, and in recessed berth pockets.</text>

  <rect x="60" y="120" width="140" height="34" rx="17" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="95" y="142" font-size="14" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">OPEN SEA</text>
  <path d="M102 186 l34 0" stroke="#64748b" stroke-width="2"/>
  <path d="M90 196 q18 -4 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M90 206 q18 -4 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>

  <path d="M90 620 C220 615, 315 610, 410 602" fill="none" stroke="#9a3412" stroke-width="4"/>
  <path d="M930 205 C1030 245, 1085 390, 1090 620" fill="none" stroke="#9a3412" stroke-width="4"/>
  <path d="M930 620 C985 622, 1035 626, 1090 636" fill="none" stroke="#9a3412" stroke-width="4"/>
  <text x="74" y="608" font-size="13" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Shoreline</text>
  <text x="1005" y="650" font-size="13" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Shoreline</text>

  <path d="M395 365 L560 298" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="10 8"/>
  <path d="M432 382 L604 314" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="10 8"/>
  <path d="M470 398 L648 330" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="470" y="286" font-size="13" font-family="Arial, sans-serif" fill="#475569" font-weight="700">Entrance approach channel</text>

  <path d="M530 250 L720 330 L930 330" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M350 330 L460 290 L510 352" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M270 455 L335 365" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M320 535 L405 535 L460 602" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M350 330 L320 535" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M510 352 L460 602" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <text x="728" y="314" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Outer breakwater</text>
  <text x="250" y="442" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Inner breakwater</text>
  <text x="464" y="625" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Breakwater / quay separator</text>

  <path d="M250 315 q18 -6 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M250 325 q18 -6 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M685 168 l34 0" stroke="#64748b" stroke-width="2"/>
  <path d="M675 178 q18 -4 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M675 188 q18 -4 36 0 t36 0" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M830 135 L760 205" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="810" y="122" font-size="14" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Wind and waves</text>

  <circle cx="655" cy="420" r="92" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="9 8"/>
  <text x="608" y="414" font-size="15" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Turning basin</text>
  <text x="622" y="436" font-size="12.5" font-family="Arial, sans-serif" fill="#475569">maneuvering circle</text>

  <rect x="735" y="472" width="210" height="20" rx="8" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="640" y="500" width="285" height="20" rx="8" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="540" y="526" width="246" height="20" rx="8" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="748" y="455" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Main quay / cargo berths</text>

  <rect x="790" y="360" width="120" height="18" rx="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="820" y="390" width="110" height="18" rx="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="845" y="420" width="100" height="18" rx="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="820" y="344" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Quays / jetties</text>

  <rect x="240" y="530" width="18" height="82" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="278" y="512" width="18" height="100" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="316" y="494" width="18" height="118" rx="6" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="213" y="491" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Fishing / small craft berths</text>

  <rect x="430" y="327" width="30" height="10" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="2" transform="rotate(-22 445 332)"/>
  <rect x="459" y="340" width="22" height="10" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="2" transform="rotate(-22 470 345)"/>
  <text x="402" y="314" font-size="13" font-family="Arial, sans-serif" fill="#111827" font-weight="700">Oil berth / dolphins</text>

  <ellipse cx="535" cy="304" rx="52" ry="22" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="445" cy="350" rx="68" ry="28" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="520" cy="396" rx="74" ry="34" fill="#fecaca" fill-opacity="0.82" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="655" cy="420" rx="112" ry="70" fill="#fca5a5" fill-opacity="0.48" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="760" cy="522" rx="178" ry="36" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="272" cy="560" rx="70" ry="44" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="440" cy="560" rx="52" ry="88" fill="#fecaca" fill-opacity="0.78" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="860" cy="395" rx="120" ry="64" fill="#fecaca" fill-opacity="0.62" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>

  <circle cx="536" cy="304" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="530" y="310" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">1</text>
  <circle cx="446" cy="350" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="440" y="356" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">2</text>
  <circle cx="520" cy="396" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="514" y="402" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">3</text>
  <circle cx="655" cy="420" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="649" y="426" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">4</text>
  <circle cx="812" cy="523" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="806" y="529" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">5</text>
  <circle cx="272" cy="560" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="266" y="566" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">6</text>
  <circle cx="440" cy="560" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="434" y="566" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">7</text>
  <circle cx="860" cy="395" r="18" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="854" y="401" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c" font-weight="700">8</text>

  <line x1="132" y1="172" x2="500" y2="290" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="72" y="150" width="250" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="92" y="170" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">1. Entrance throat shoaling</text>
  <text x="92" y="189" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Sediment converges where the approach channel enters the breakwater gap.</text>

  <line x1="145" y1="218" x2="426" y2="338" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="72" y="208" width="260" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="92" y="228" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">2. Lee zone behind outer breakwater</text>
  <text x="92" y="247" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Wave shelter reduces transport capacity and encourages deposition.</text>

  <line x1="145" y1="276" x2="494" y2="384" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="72" y="266" width="252" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="92" y="286" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">3. Inner approach transition zone</text>
  <text x="92" y="305" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Flow expansion between entrance and basin creates another shoaling reach.</text>

  <line x1="995" y1="182" x2="701" y2="396" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="888" y="150" width="238" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="908" y="170" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">4. Turning basin deposition</text>
  <text x="908" y="189" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Large maneuvering circles are classic low-velocity fine-sediment traps.</text>

  <line x1="1038" y1="600" x2="853" y2="534" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="888" y="580" width="238" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="908" y="600" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">5. Main berth pockets</text>
  <text x="908" y="619" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Overdeepened quay fronts commonly accumulate silt and need maintenance dredging.</text>

  <line x1="96" y1="666" x2="241" y2="575" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="72" y="642" width="250" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="92" y="662" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">6. Small-craft basin / fishing port</text>
  <text x="92" y="681" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Poor flushing in recessed side basins makes them prone to shoaling.</text>

  <line x1="375" y1="680" x2="430" y2="585" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="326" y="642" width="276" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="346" y="662" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">7. Enclosed repair or inner berth pocket</text>
  <text x="346" y="681" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Recessed harbor corners and dock approaches often trap fine sediment.</text>

  <line x1="1010" y1="250" x2="899" y2="396" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="888" y="218" width="238" height="50" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="908" y="238" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">8. Sheltered inner quay zone</text>
  <text x="908" y="257" font-size="12.5" font-family="Arial, sans-serif" fill="#7f1d1d">Weak circulation behind berths and jetties promotes local deposition.</text>

  <rect x="66" y="706" width="328" height="24" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="84" y="723" font-size="12.5" font-family="Arial, sans-serif" fill="#9a3412" font-weight="700">Brown line = shoreline. Dark thick lines = breakwaters or major harbor boundaries.</text>
  <rect x="406" y="706" width="278" height="24" rx="8" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="424" y="723" font-size="12.5" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="700">Blue arrow = dominant wave or sediment approach direction.</text>
  <rect x="698" y="706" width="438" height="24" rx="8" fill="#fee2e2" stroke="#fecaca"/>
  <text x="716" y="723" font-size="12.5" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Red shaded zones and numbered markers = likely sedimentation hot spots for monitoring and dredging.</text>
</svg>
