<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Dry bulk stockyard layout concept</title>
  <desc id="desc">Concept plan showing berth conveyor feed, stockpiles, reclaim, and outbound transport routes.</desc>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="372" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <text x="52" y="58" font-size="24" font-family="Arial, sans-serif" fill="#1f2937" font-weight="700">Stockyard and Reclaim Layout (Concept)</text>

  <rect x="60" y="92" width="230" height="260" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="116" y="122" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Marine Side / Berth</text>
  <rect x="92" y="174" width="160" height="54" rx="8" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="118" y="207" font-size="16" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Receiving Hopper</text>

  <rect x="308" y="188" width="170" height="24" rx="8" fill="#bbf7d0" stroke="#4ade80"/>
  <text x="337" y="180" font-size="14" font-family="Arial, sans-serif" fill="#166534" font-weight="700">Conveyor gallery from berth</text>

  <rect x="500" y="88" width="520" height="270" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="691" y="116" font-size="18" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Bulk Stockyard</text>
  <rect x="540" y="135" width="380" height="24" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="646" y="152" font-size="13" font-family="Arial, sans-serif" fill="#166534">Stacker travel rail / conveyor</text>
  <polygon points="560,310 650,180 740,310" fill="#d6d3d1" stroke="#a8a29e" stroke-width="2"/>
  <polygon points="735,310 825,165 915,310" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <text x="590" y="330" font-size="14" font-family="Arial, sans-serif" fill="#334155">Pile A</text>
  <text x="770" y="330" font-size="14" font-family="Arial, sans-serif" fill="#334155">Pile B</text>
  <line x1="555" y1="340" x2="915" y2="340" stroke="#94a3b8" stroke-width="4"/>
  <text x="620" y="360" font-size="13" font-family="Arial, sans-serif" fill="#475569">Reclaimer / dozer operating corridor</text>

  <rect x="1040" y="112" width="95" height="70" rx="10" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="1064" y="138" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">Truck</text>
  <text x="1058" y="158" font-size="14" font-family="Arial, sans-serif" fill="#991b1b" font-weight="700">/ Plant</text>

  <rect x="1040" y="214" width="95" height="70" rx="10" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1067" y="240" font-size="14" font-family="Arial, sans-serif" fill="#5b21b6" font-weight="700">Drainage</text>
  <text x="1063" y="260" font-size="14" font-family="Arial, sans-serif" fill="#5b21b6" font-weight="700">Sump</text>

  <rect x="500" y="374" width="635" height="16" rx="8" fill="#e5e7eb"/>
  <text x="537" y="389" font-size="12.5" font-family="Arial, sans-serif" fill="#475569">Allow space for fire access, dust fencing, runoff control, and future expansion reserve.</text>
</svg>