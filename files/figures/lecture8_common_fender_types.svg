<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Common fender type schematic comparison: cell, cone, arch, cylindrical, and pneumatic">
  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="720" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>

  <text x="50" y="72" font-size="34" font-weight="700" fill="#1f2937">Common Fender Types (Concept Schematic)</text>
  <text x="50" y="108" font-size="20" fill="#475569">Illustrative shapes for teaching only. Actual products vary by manufacturer.</text>

  <g transform="translate(55,150)">
    <rect x="0" y="0" width="340" height="255" rx="12" fill="#f8fbff" stroke="#d7e3f3"/>
    <text x="22" y="34" font-size="24" font-weight="700" fill="#1f2937">1. Cell Fender</text>
    <rect x="30" y="65" width="24" height="140" fill="#94a3b8"/>
    <rect x="286" y="65" width="24" height="140" fill="#94a3b8"/>
    <circle cx="170" cy="135" r="58" fill="#334155"/>
    <circle cx="170" cy="135" r="26" fill="#f8fbff"/>
    <rect x="122" y="200" width="96" height="16" rx="8" fill="#0f766e"/>
    <text x="22" y="237" font-size="16" fill="#475569">High energy, panel-compatible</text>
  </g>

  <g transform="translate(430,150)">
    <rect x="0" y="0" width="340" height="255" rx="12" fill="#f8fbff" stroke="#d7e3f3"/>
    <text x="22" y="34" font-size="24" font-weight="700" fill="#1f2937">2. Cone Fender</text>
    <rect x="30" y="65" width="24" height="140" fill="#94a3b8"/>
    <rect x="286" y="65" width="24" height="140" fill="#94a3b8"/>
    <polygon points="100,190 240,190 205,90 135,90" fill="#334155"/>
    <circle cx="170" cy="146" r="12" fill="#f8fbff"/>
    <rect x="118" y="200" width="104" height="16" rx="8" fill="#0f766e"/>
    <text x="22" y="237" font-size="16" fill="#475569">Efficient energy/reaction profile</text>
  </g>

  <g transform="translate(805,150)">
    <rect x="0" y="0" width="340" height="255" rx="12" fill="#f8fbff" stroke="#d7e3f3"/>
    <text x="22" y="34" font-size="24" font-weight="700" fill="#1f2937">3. Arch Fender</text>
    <rect x="30" y="65" width="24" height="140" fill="#94a3b8"/>
    <rect x="286" y="65" width="24" height="140" fill="#94a3b8"/>
    <path d="M95 190 L245 190 L217 120 Q170 86 123 120 Z" fill="#334155"/>
    <rect x="120" y="200" width="100" height="16" rx="8" fill="#0f766e"/>
    <text x="22" y="237" font-size="16" fill="#475569">Simple and rugged profile</text>
  </g>

  <g transform="translate(55,435)">
    <rect x="0" y="0" width="525" height="255" rx="12" fill="#f8fbff" stroke="#d7e3f3"/>
    <text x="22" y="34" font-size="24" font-weight="700" fill="#1f2937">4. Cylindrical Fender</text>
    <rect x="30" y="86" width="24" height="105" fill="#94a3b8"/>
    <rect x="472" y="86" width="24" height="105" fill="#94a3b8"/>
    <rect x="90" y="105" width="350" height="66" rx="33" fill="#334155"/>
    <circle cx="265" cy="138" r="13" fill="#f8fbff"/>
    <text x="22" y="237" font-size="16" fill="#475569">Utility edge protection and simple berths</text>
  </g>

  <g transform="translate(620,435)">
    <rect x="0" y="0" width="525" height="255" rx="12" fill="#f8fbff" stroke="#d7e3f3"/>
    <text x="22" y="34" font-size="24" font-weight="700" fill="#1f2937">5. Pneumatic Fender</text>
    <line x1="95" y1="130" x2="440" y2="130" stroke="#94a3b8" stroke-width="8"/>
    <ellipse cx="265" cy="130" rx="145" ry="72" fill="#334155"/>
    <ellipse cx="265" cy="130" rx="102" ry="46" fill="#1e293b"/>
    <circle cx="265" cy="130" r="12" fill="#f8fbff"/>
    <circle cx="170" cy="130" r="7" fill="#f8fbff"/>
    <circle cx="360" cy="130" r="7" fill="#f8fbff"/>
    <text x="22" y="237" font-size="16" fill="#475569">Floating type for temporary or offshore interface</text>
  </g>
</svg>
